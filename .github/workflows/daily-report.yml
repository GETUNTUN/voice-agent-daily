name: 语音大模型每日日报

on:
  schedule:
    # 每天UTC 0:00 运行（北京时间8:00）
    - cron: '0 0 * * *'
    # 设置时区为北京时间
    timezone: 'Asia/Shanghai'
  # 支持手动触发
  workflow_dispatch:

# 设置权限
permissions:
  contents: read

jobs:
  generate-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: 抓取最新论文
        env:
          ARXIV_KEYWORDS: 'speech language model,voice interaction,audio LLM,spoken dialogue'
          MAX_PAPERS: 10
        run: python scripts/fetch_papers.py

      - name: 抓取GitHub趋势项目
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROJECT_KEYWORDS: 'speech,voice,audio,dialogue'
        run: python scripts/fetch_projects.py

      - name: 抓取行业动态
        run: python scripts/fetch_news.py

      - name: 生成报告
        env:
          # 如果不需要大模型解读，可以注释掉这一项
          # DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # 或者使用OpenAI
          # OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REPORT_DATE: $(date +%Y-%m-%d)
        run: python scripts/generate_report.py

      - name: 推送到飞书
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: python scripts/send_to_feishu.py
